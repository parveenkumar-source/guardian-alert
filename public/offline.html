<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Raksha — Offline</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0a0a0f;
      color: #e2e2e8;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }
    .container {
      text-align: center;
      max-width: 360px;
    }
    .icon {
      width: 80px; height: 80px;
      margin: 0 auto 1.5rem;
      border-radius: 1rem;
      background: rgba(220,38,38,0.1);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .icon svg { width: 40px; height: 40px; color: #dc2626; }
    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
    }
    p {
      font-size: 0.875rem;
      color: #8888a0;
      line-height: 1.6;
      margin-bottom: 1.5rem;
    }
    .emergency {
      background: rgba(220,38,38,0.08);
      border: 1px solid rgba(220,38,38,0.2);
      border-radius: 0.75rem;
      padding: 1rem;
      margin-bottom: 1.5rem;
    }
    .emergency p { color: #e2e2e8; margin-bottom: 0.5rem; font-weight: 500; }
    .emergency a {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      color: #dc2626;
      font-weight: 600;
      font-size: 1.25rem;
      text-decoration: none;
    }
    .emergency a:active { opacity: 0.7; }
    .retry-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.75rem 1.5rem;
      border-radius: 0.5rem;
      background: #dc2626;
      color: white;
      font-weight: 600;
      font-size: 0.875rem;
      border: none;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .retry-btn:active { opacity: 0.8; }
    .tip {
      margin-top: 2rem;
      font-size: 0.75rem;
      color: #55556a;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m-9.303 3.376c-.866 1.5.217 3.374 1.948 3.374h14.71c1.73 0 2.813-1.874 1.948-3.374L13.949 3.378c-.866-1.5-3.032-1.5-3.898 0L2.697 16.126ZM12 15.75h.007v.008H12v-.008Z" />
      </svg>
    </div>

    <h1>You're Offline</h1>
    <p>No internet connection detected. Some features need connectivity, but you can still call for help.</p>

    <div class="emergency">
      <p>Emergency? Call directly:</p>
      <a href="tel:112">📞 112</a>
    </div>

    <button class="retry-btn" onclick="window.location.reload()">
      ↻ Try Again
    </button>

    <p class="tip">Raksha will reconnect automatically when your network is back.</p>
  </div>
</body>
</html>
